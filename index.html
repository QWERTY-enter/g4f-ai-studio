<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4F AI Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>G4F AI Studio</h4>
        </div>
        <div class="card-body">
            <div id="chatBox" style="height: 400px; overflow-y: auto; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd;"></div>
            <div class="input-group mt-3">
                <input type="text" id="chatInput" class="form-control" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendChat()">
                <button class="btn btn-primary" onclick="sendChat()">Kirim</button>
            </div>
        </div>
    </div>
</div>

<script>
const BACKEND = 'http://localhost:5000';

async function sendChat() {
    const input = document.getElementById('chatInput');
    const chatBox = document.getElementById('chatBox');
    const msg = input.value.trim();
    if (!msg) return;

    chatBox.innerHTML += `<div><strong>Kamu:</strong> ${msg}</div>`;
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    const res = await fetch(`${BACKEND}/chat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [{role: 'user', content: msg}],
            stream: false
        })
    });

    const data = await res.json();
    if (data.choices && data.choices[0]) {
        chatBox.innerHTML += `<div><strong>AI:</strong> ${data.choices[0].message.content}</div>`;
    }
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
